; FileCopier - Configuration file
; Edit these values to customize behavior.

; Number of parallel copy threads
; HDD: 4-8  |  SSD: 8-16  |  NVMe: 16-32
threadCount=8

; Read/write buffer size in KB (256, 512, 1024, 2048, 4096)
; Larger = faster on sequential copies, higher memory usage
bufferSizeKB=1024

; Maximum retries per file on error
maxRetries=3

; Delay between retries in milliseconds
retryDelayMs=500

; Verify file integrity after copy (compares sizes; set to 1 for extra safety)
verifyAfterCopy=0

; Skip files that fail after all retries (1=skip, 0=abort on error)
skipOnError=1

; Use FILE_FLAG_NO_BUFFERING (bypasses OS cache, faster on large files)
useNoBuffering=1

; Use overlapped (async) I/O for maximum throughput
useOverlapped=1

; Log file path
logPath=filecopier.log

; Resume state file path (stores partial copy progress)
statePath=filecopier_state.json
